<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE HUNT🎤🔥: Getting a Job in TECH⁉️</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      line-height: 1.1;
      margin: 0;
    }

    .gradient-text {
      background: linear-gradient(135deg, #000000, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    .emoji {
      background: none;
      color: initial;
      -webkit-text-fill-color: initial;
    }

    .red-emoji {
      color: red;
      -webkit-text-fill-color: red;
    }
  </style>
</head>
<body>
  <h1 style="-webkit-text-stroke: 2px white; color: white;" >
    <span class="gradient-text">TheHunt.</span>
    <span class="red-emoji">LIVE</span>
    <span class="gradient-text">/JOIN</span>
  </h1>
</body>
</html>
